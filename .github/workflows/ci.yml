name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test
        run: GOEXPERIMENT=simd go test -v -count=1 ./...

      - name: Vet
        run: GOEXPERIMENT=simd go vet ./...

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Benchmark
        run: GOEXPERIMENT=simd go test -bench=. -benchmem -run='^$' ./art/...
